<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demande Landing Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f7fb;
}

.container{
max-width:600px;
margin:auto;
margin-top:80px;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:30px;
}

input,select,textarea{
width:100%;
padding:14px;
margin-bottom:20px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

button{
background:#4facfe;
color:white;
border:none;
padding:15px;
font-size:16px;
border-radius:6px;
cursor:pointer;
width:100%;
}

#merci{
display:none;
text-align:center;
color:green;
font-size:20px;
margin-top:20px;
}

/* RESPONSIVE */

@media(max-width:600px){

.container{
margin:30px 15px;
padding:25px;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Demandez votre Landing Page Premium</h2>

<form id="leadForm">

<input type="text" name="nom" placeholder="Nom complet" required>

<input type="email" name="email" placeholder="Email" required>

<input type="tel" name="telephone" placeholder="Téléphone" required>

<select name="secteur">

<option value="">Secteur d'activité</option>
<option>Coaching</option>
<option>E-commerce</option>
<option>Immobilier</option>
<option>Marketing</option>
<option>Autre</option>

</select>

<textarea name="description" placeholder="Décrivez votre projet"></textarea>

<button type="submit">Envoyer la demande</button>

</form>

<p id="merci">Merci ! Votre demande a été envoyée avec succès. Nous vous contacterons rapidement.</p>

</div>

<script>

document.getElementById("leadForm").addEventListener("submit",function(e){

e.preventDefault()

const data=new FormData(this)

fetch("https://hooks.zapier.com/hooks/catch/XXXXX",{
method:"POST",
body:data
})
.then(()=>{

document.getElementById("leadForm").style.display="none"
document.getElementById("merci").style.display="block"

})

})

</script>

</body>
</html>
